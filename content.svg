<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 385" width="600" height="385">
  <defs>
    <style>text { font-family: 'JetBrains Mono','Fira Code','Cascadia Code','Menlo',monospace; }</style>
    <!-- Animation clipPaths -->
    <clipPath id="c1"><rect x="20" y="24" width="0" height="25"><animate attributeName="width" from="0" to="300" begin="0.3s" dur="0.8s" fill="freeze"/></rect></clipPath>
    <clipPath id="c2"><rect x="20" y="60" width="0" height="22"><animate attributeName="width" from="0" to="600" begin="1.2s" dur="1.2s" fill="freeze"/></rect></clipPath>
    <clipPath id="c3"><rect x="40" y="90" width="0" height="22"><animate attributeName="width" from="0" to="400" begin="2.4s" dur="0.8s" fill="freeze"/></rect></clipPath>
    <clipPath id="c4"><rect x="60" y="120" width="0" height="22"><animate attributeName="width" from="0" to="600" begin="3.0s" dur="0.6s" fill="freeze"/></rect></clipPath>
    <clipPath id="c5"><rect x="60" y="150" width="0" height="22"><animate attributeName="width" from="0" to="600" begin="3.6s" dur="0.6s" fill="freeze"/></rect></clipPath>
    <clipPath id="c6"><rect x="60" y="180" width="0" height="22"><animate attributeName="width" from="0" to="600" begin="4.2s" dur="0.6s" fill="freeze"/></rect></clipPath>
    <clipPath id="c7"><rect x="20" y="220" width="0" height="22"><animate attributeName="width" from="0" to="400" begin="5.0s" dur="0.8s" fill="freeze"/></rect></clipPath>
    <clipPath id="c8"><rect x="40" y="250" width="0" height="22"><animate attributeName="width" from="0" to="400" begin="5.8s" dur="0.8s" fill="freeze"/></rect></clipPath>
    <clipPath id="c9"><rect x="40" y="280" width="0" height="22"><animate attributeName="width" from="0" to="400" begin="6.4s" dur="0.8s" fill="freeze"/></rect></clipPath>
    <clipPath id="c10"><rect x="40" y="310" width="0" height="22"><animate attributeName="width" from="0" to="400" begin="7.0s" dur="0.8s" fill="freeze"/></rect></clipPath>
    <clipPath id="c11"><rect x="40" y="340" width="0" height="22"><animate attributeName="width" from="0" to="400" begin="7.6s" dur="0.8s" fill="freeze"/></rect></clipPath>
  </defs>

  <rect width="600" height="385" rx="10" fill="#EAE0D5" />

  <text x="20" y="45" font-size="24" fill="#0A0908" font-weight="bold" clip-path="url(#c1)" opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="0.3s" dur="0.01s" fill="freeze"/>
    Mun Khatiwada
  </text>

  <text x="20" y="78" font-size="18" fill="#22333B" clip-path="url(#c2)" opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="1.2s" dur="0.01s" fill="freeze"/>
    Full-Stack Software Engineer
  </text>
  <g fill="#22333B" font-size="14">
    <text x="40" y="108" clip-path="url(#c3)" opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="2.4s" dur="0.01s" fill="freeze"/>
      ├── Skills
    </text>
    <text x="60" y="138" clip-path="url(#c4)" opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="3.0s" dur="0.01s" fill="freeze"/>
      ├── Frontend: JS, TS, React, Next.js
    </text>
    <text x="60" y="168" clip-path="url(#c5)" opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="3.6s" dur="0.01s" fill="freeze"/>
      ├── Backend: Node.js, Express, MySQL, Supabase
    </text>
    <text x="60" y="198" clip-path="url(#c6)" opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="4.2s" dur="0.01s" fill="freeze"/>
      └── AI/ML: Python
    </text>
  </g>

  <text x="20" y="238" font-size="18" fill="#22333B" clip-path="url(#c7)" opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="5.0s" dur="0.01s" fill="freeze"/>
    Hobbies
  </text>
  <g fill="#5E503F" font-size="14">
    <text x="40" y="268" clip-path="url(#c8)" opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="5.8s" dur="0.01s" fill="freeze"/>
      ├── Plays guitar &amp; into music
    </text>
    <text x="40" y="298" clip-path="url(#c9)" opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="6.4s" dur="0.01s" fill="freeze"/>
      ├── Writes poems
    </text>
    <text x="40" y="328" clip-path="url(#c10)" opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="7.0s" dur="0.01s" fill="freeze"/>
      ├── Funny, non-chalant, likes coffee
    </text>
    <text x="40" y="358" clip-path="url(#c11)" opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="7.6s" dur="0.01s" fill="freeze"/>
      └── Into fashion
    </text>
  </g>
</svg>
