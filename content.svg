<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700&amp;display=swap');
      
      .container {
        font-family: 'Inter', sans-serif;
        background: #0a0a0c;
        color: #e0e0e0;
        width: 100%;
        height: 100%;
        padding: 40px;
        box-sizing: border-box;
        border-radius: 20px;
        border: 2px solid #00f2ff;
      }

      /* Typing effect applied ONLY to the name */
      .typewriter {
        overflow: hidden;
        border-right: .15em solid #00f2ff;
        white-space: nowrap;
        animation: typing 2s steps(20, end), blink-caret .75s step-end infinite;
        display: inline-block;
      }

      @keyframes typing {
        from { width: 0 }
        to { width: 100% }
      }

      @keyframes blink-caret {
        from, to { border-color: transparent }
        50% { border-color: #00f2ff }
      }

      h1 { color: #00f2ff; font-size: 32px; margin: 0 0 15px 0; }
      .role { font-size: 16px; margin-bottom: 20px; font-weight: bold; }
      h2 { font-size: 10px; text-transform: uppercase; letter-spacing: 2px; color: #888; margin: 15px 0 5px 0; }
      .item { margin: 5px 0; font-size: 13px; }
    </style>
  </defs>

  <foreignObject width="600" height="400">
    <div xmlns="http://www.w3.org/1999/xhtml" class="container">
      <h1><span class="typewriter">Mun Khatiwada</span></h1>
      <div class="role">Full-Stack Software Engineer</div>
      
      <h2>Skills</h2>
      <div class="item">• Frontend: JS, TS, React, Next.js</div>
      <div class="item">• Backend: Node.js, Express, FastAPI</div>
      <div class="item">• Database: MySQL, MongoDB, PostgreSQL</div>

      <h2>Hobbies</h2>
      <div class="item">• 🎸 Plays guitar &amp; into music</div>
      <div class="item">• ✍️ Writes poems</div>
      <div class="item">• ☕ Funny, non-chalant, snd likes coffee</div>
      <div class="item">• 🕶️ Into fashion</div>
    </div>
  </foreignObject>
</svg>
