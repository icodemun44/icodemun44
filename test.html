<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mun Khatiwada | Portfolio</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        :root {
            --bg: #0a0a0c;
            --accent: #00f2ff;
            --text: #e0e0e0;
            --card-bg: #16161a;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .card {
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 16px;
            border: 1px solid #333;
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.08);
            width: 550px;
            height: 350px;
            overflow-y: auto;
            position: relative;
        }

        h1 { color: var(--accent); margin: 0 0 0.2rem 0; font-size: 1.5rem; }
        h2 { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1.5px; color: #888; margin: 1.2rem 0 0.5rem 0; }

        .item { margin: 6px 0; padding-left: 8px; border-left: 2px solid var(--accent); font-size: 0.9rem; }
        
        .animate-in { opacity: 0; transform: translateY(10px); }
    </style>
</head>
<body>

    <div class="card">
        <h1 class="animate-in">Mun Khatiwada</h1>
        <p class="animate-in" style="margin: 0; font-size: 0.9rem;">Full-Stack Software Engineer</p>

        <h2 class="animate-in">Skills</h2>
        <div class="item animate-in"><strong>Frontend:</strong> JS, TS, React, Next.js</div>
        <div class="item animate-in"><strong>Backend:</strong> Node.js, Express, MySQL, Supabase</div>
        <div class="item animate-in"><strong>AI/ML:</strong> Python</div>

        <h2 class="animate-in">Hobbies</h2>
        <div class="item animate-in">🎸 Plays guitar & into music</div>
        <div class="item animate-in">✍️ Writes poems</div>
        <div class="item animate-in">☕ Funny, non-chalant, likes coffee</div>
        <div class="item animate-in">🕶️ Into fashion</div>
    </div>

    <script>
        const tl = gsap.timeline();
        tl.from(".card", { duration: 0.8, scale: 0.95, opacity: 0, ease: "power3.out" })
          .to(".animate-in", { duration: 0.5, opacity: 1, y: 0, stagger: 0.08 });
    </script>
</body>
</html>
